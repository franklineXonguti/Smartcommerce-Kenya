name: Frontend CI

on:
  push:
    branches: [develop, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci || echo "package-lock.json not yet created, using npm install"
          npm install || echo "Frontend not yet initialized"

      - name: Run linter
        run: |
          cd frontend
          npm run lint || echo "Lint script not configured yet"

      - name: Run tests
        run: |
          cd frontend
          npm test -- --run || echo "Tests not configured yet"

      - name: Build
        run: |
          cd frontend
          npm run build || echo "Build not configured yet"
